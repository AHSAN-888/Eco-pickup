<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoPickup</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'], inter: ['Inter', 'sans-serif'] },
                    colors: { brand: { 50: '#f0fdf4', 100: '#dcfce7', 300: '#86efac', 400: '#4ade80', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' } }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen relative overflow-hidden font-sans">
    <!-- Background Blobs -->
    <div class="absolute top-0 -left-10 w-72 h-72 bg-brand-300 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-[spin_10s_linear_infinite]"></div>
    <div class="absolute bottom-0 -right-10 w-96 h-96 bg-brand-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

    <div class="w-full max-w-md bg-white p-8 rounded-[2rem] shadow-xl border border-gray-100 relative z-10 mx-4">
        <div class="text-center mb-8">
            <a href="index.html" class="inline-flex items-center gap-2 group mb-6">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white shadow-lg"><i class="fa-solid fa-leaf"></i></div>
                <span class="text-2xl font-extrabold text-gray-900 group-hover:text-brand-600 transition-colors">EcoPickup</span>
            </a>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back!</h2>
            <p class="text-gray-500 text-sm">Login to schedule pickups and track rewards.</p>
        </div>

        <form action="dashboard.html" method="GET" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl p-3 pl-10 outline-none focus:border-brand-500 transition-colors" placeholder="user@example.com" required>
                    <i class="fa-solid fa-envelope absolute left-4 top-4 text-gray-400"></i>
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2 flex justify-between">
                    <span>Password</span>
                    <a href="#" class="text-brand-600 hover:text-brand-700 font-medium">Forgot?</a>
                </label>
                <div class="relative">
                    <input type="password" class="w-full bg-gray-50 border border-gray-200 text-gray-900 rounded-xl p-3 pl-10 outline-none focus:border-brand-500 transition-colors" placeholder="••••••••" required>
                    <i class="fa-solid fa-lock absolute left-4 top-4 text-gray-400"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-brand-500/30 transform hover:-translate-y-0.5 transition-all text-lg flex justify-center items-center gap-2">
                Log In <i class="fa-solid fa-arrow-right text-sm"></i>
            </button>
        </form>

        <div class="mt-8 flex items-center">
            <div class="flex-1 border-t border-gray-200"></div>
            <span class="mx-4 text-sm text-gray-400 font-semibold uppercase">Or continue with</span>
            <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <div class="mt-6 flex gap-4">
            <button class="w-full bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-brands fa-google text-red-500"></i> Google
            </button>
            <button class="w-full bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-brands fa-apple text-xl"></i> Apple
            </button>
        </div>

        <p class="mt-8 text-center text-sm text-gray-600 font-medium">
            New to EcoPickup? <a href="#" class="text-brand-600 font-bold hover:underline">Create an account</a>
        </p>
    </div>
</body>
</html>
